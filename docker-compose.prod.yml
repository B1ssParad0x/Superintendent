# Production compose: backend + AI worker only
# Uses MongoDB Atlas (set MONGO_URI in .env)
# Frontend deploys separately (e.g. Vercel)
#
# Run: docker compose -f docker-compose.prod.yml up -d --build

services:
  backend_go:
    build:
      context: ./backend_go
      dockerfile: Dockerfile
    container_name: superintendent-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE}
      - SOLANA_RPC=${SOLANA_RPC:-https://api.devnet.solana.com}
      - SOLANA_KEYPAIR_JSON=${SOLANA_KEYPAIR_JSON}
      - AI_WORKER_URL=http://ai_worker_py:8001
      - EDGE_API_KEY=${EDGE_API_KEY}
      - HOST_URL=${HOST_URL}
    depends_on:
      - ai_worker_py
    restart: unless-stopped

  ai_worker_py:
    build:
      context: ./ai_worker_py
      dockerfile: Dockerfile
    container_name: superintendent-ai-worker
    ports:
      - "8001:8001"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ELEVEN_API_KEY=${ELEVEN_API_KEY}
      - ELEVEN_VOICE_ID=${ELEVEN_VOICE_ID}
    restart: unless-stopped
